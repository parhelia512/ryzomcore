name: build
description: build
inputs:
  os:
    description: os
    required: true
  install-dir:
    description: install directory
    required: true
  build-dir:
    description: build directory
    required: true
  build-version:
    description: build version
    required: true
  image-group:
    description: image group
    required: true
  image-version:
    description: image version
    required: true
runs:
  using: composite
  steps:
    - uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "^3.31.11"

    - name: Dependencies Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt update
        sudo apt install --yes \
          build-essential ccache \
          bison autoconf automake \
          libpng-dev \
          libjpeg-dev \
          libgif-dev libfreetype-dev \
          freeglut3-dev \
          liblua5.2-dev libluabind-dev libcpptest-dev \
          libogg-dev libvorbis-dev libopenal-dev \
          libavcodec-dev libavformat-dev libavdevice-dev libswscale-dev libpostproc-dev \
          libmysqlclient-dev \
          libcurl4-openssl-dev libssl-dev \
          libsquish-dev \
          liblzma-dev \
          libgsf-1-dev \
          qtbase5-dev qttools5-dev qttools5-dev-tools

    - name: Install Dependency
      if: runner.os == 'Linux'
      shell: bash
      run: >
        sh ${{ inputs.build-dir }}/nel-*.sh
        --skip-license
        --include-subdir
        --prefix=${{ inputs.install-dir }}

    - name: Configure ccache
      shell: bash
      run: |
        ccache --set-config=max_size=1G
        ccache --set-config=compression=true
        ccache -z

    - name: Configure CMake
      if: runner.os == 'Linux'
      shell: bash
      run: >
        cmake --preset ci-linux-snowballs
        -DCMAKE_C_COMPILER_LAUNCHER=ccache
        -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

    - name: Build
      shell: bash
      run: cmake --build --preset snowballs

    - name: ccache stats
      if: always()
      shell: bash
      run: ccache -sv

    - name: Test
      shell: bash
      run: ctest --preset snowballs

    - uses: actions/upload-artifact@v4
      if: ( !cancelled() )
      with:
        name: snowballs-${{ inputs.os }}-test-results
        if-no-files-found: error
        path: ${{ inputs.build-dir }}/reports/*.xml

    - name: Package
      shell: bash
      run: cpack --preset snowballs -R "${{ inputs.build-version }}"

    - name: Build Docker image
      shell: bash
      if: inputs.os == 'ubuntu-24.04'
      run: |
        IMAGE_TAG="${{ inputs.image-group }}/ryzomcore-snowballs:${{ inputs.image-version }}"
        docker build . --file snowballs2/docker/Dockerfile --tag "${IMAGE_TAG}"
        docker save --output=${{ inputs.build-dir }}/snowballs/snowballs-docker-${{ inputs.build-version }}.tar "${IMAGE_TAG}"

