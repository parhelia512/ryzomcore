name: "Ryzom Client: build on multiple platforms (hunter)"

on:
  push:
    branches: [ "core4", "feature/*" ]
    paths:
      - .github/workflows/build-client.yml
      # TODO use nel package instead
      - nel/**
      - ryzom/**
      - cmake/**
      - CMakeModules/**
      - CMakeLists.txt
      - CMakePresets.json
  pull_request:
    branches: [ "core4" ]
    paths:
      - .github/workflows/build-client.yml
      # TODO use nel package instead
      - nel/**
      - ryzom/**
      - cmake/**
      - CMakeModules/**
      - CMakeLists.txt
      - CMakePresets.json

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os:
         - ubuntu-24.04
         - ubuntu-22.04
         - windows-2025
         - windows-2022
         # TODO: Re-enable macOS when Hunter ships a PNG version compatible with Xcode 16+ (fp.h removed)
         # - macos-15
        include:
          - os: windows-2022
            cmake_preset: ci-windows-ryzom-client-hunter
          - os: windows-2025
            cmake_preset: ci-windows-ryzom-client-hunter
          - os: ubuntu-22.04
            ubuntu_version: 22.04
            cmake_preset: ci-linux-ryzom-client-hunter
          - os: ubuntu-24.04
            ubuntu_version: 24.04
            cmake_preset: ci-linux-ryzom-client-hunter

    steps:
    - uses: actions/checkout@v4
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
        echo "hunter-dir=${{ github.workspace }}/build/.hunter" >> "$GITHUB_OUTPUT"
        echo "week=$(date +%YW%V)" >> "$GITHUB_OUTPUT"

    - uses: lukka/get-cmake@latest
      with:
        cmakeVersion: 3.31.11

    - name: Dependencies Linux
      if: runner.os == 'Linux'
      run: |
        wget --quiet https://packages.microsoft.com/config/ubuntu/${{ matrix.ubuntu_version }}/packages-microsoft-prod.deb
        sudo dpkg -i packages-microsoft-prod.deb
        sudo apt update
        sudo apt remove --yes man-db
        sudo apt update
        sudo apt install -y --no-install-recommends \
          ccache \
          libasound2-dev \
          libgl1-mesa-dev \
          libjack-dev \
          libpulse-dev \
          libxrandr-dev \
          libxrender-dev \
          libxxf86vm-dev \
          libmsquic
        wget https://raw.githubusercontent.com/microsoft/msquic/main/src/inc/msquic.h
        wget https://raw.githubusercontent.com/microsoft/msquic/main/src/inc/msquic_posix.h
        wget https://raw.githubusercontent.com/microsoft/msquic/main/src/inc/quic_sal_stub.h
        sudo mv msquic.h msquic_posix.h quic_sal_stub.h /usr/include/

    - uses: actions/cache@v4
      if: runner.os == 'Linux'
      with:
        path: ~/.cache/ccache
        key: ccache-client-${{ matrix.os }}-${{ steps.strings.outputs.week }}-${{ github.sha }}
        restore-keys: ccache-client-${{ matrix.os }}-${{ steps.strings.outputs.week }}-

    - name: Configure ccache
      if: runner.os == 'Linux'
      run: |
        ccache --set-config=max_size=1G
        ccache --set-config=compression=true
        ccache -z

    - uses: actions/cache/restore@v4
      with:
        path: ${{ steps.strings.outputs.hunter-dir }}
        key: ${{ matrix.os }}-hunter-${{ steps.strings.outputs.week }}-${{ github.sha }}
        restore-keys: ${{ matrix.os }}-hunter-${{ steps.strings.outputs.week }}-

    - uses: actions/cache/restore@v4
      if: runner.os == 'Windows'
      with:
        path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
        key: ${{ matrix.os }}-chocolatey-${{ steps.strings.outputs.week }}

    - name: Dependencies Windows
      if: runner.os == 'Windows'
      run: |
        choco install directx-sdk nsis

    - uses: actions/cache/save@v4
      if: runner.os == 'Windows'
      with:
        path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
        key: ${{ matrix.os }}-chocolatey-${{ steps.strings.outputs.week }}

    - name: Configure CMake
      env:
        MACOSX_DEPLOYMENT_TARGET: 10.13
      run: >
        cmake --preset ${{ matrix.cmake_preset }}
        ${{ matrix.cmake_options }}
        -DHUNTER_CONFIGURATION_TYPES=Release
        -DHUNTER_ENABLED=ON
        -DHUNTER_ROOT=${{ steps.strings.outputs.hunter-dir }}
        ${{ runner.os == 'Linux' && '-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache' || '' }}
        -S ${{ github.workspace }}

    - uses: actions/cache/save@v4
      with:
        path: ${{ steps.strings.outputs.hunter-dir }}
        key: ${{ matrix.os }}-hunter-${{ steps.strings.outputs.week }}-${{ github.sha }}

    - name: Build
      env:
        MACOSX_DEPLOYMENT_TARGET: 10.13
      run: cmake --build --preset ci-ryzom-client

    - name: ccache stats
      if: always() && runner.os == 'Linux'
      run: ccache -sv

    - name: Package
      run: cpack --preset ci-ryzom-client

    - uses: actions/upload-artifact@v4
      if: ${{ failure() }}
      with:
        name: ${{ matrix.os }}-logs
        path: build/**/*.log

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-client-package
        path: build/ryzom-client/ryzomcore-*
        if-no-files-found: error
